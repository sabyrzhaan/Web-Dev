<!DOCTYPE html>
<html lang = "en">
<head>
        <meta charset = "UTF-8">
        <title>Facebook</title>
        <link rel = "stylesheet" href = "facebook.css">
        <link rel="icon" href="https://th.yamaha.com/en/files/1_Facebook_Logo_Primary.png">
</head>
<body>
         <div class = "content">
                 <div class="container">
                         <div class = "image">
                                 <img id = "logo" src = "facebook_logo.svg" alt = "Facebook Logo"/>
                         </div>
                         <h2>Connect with friends and the world around you on Facebook.</h2>
                 </div>
                 <div class = "register">
                         <form>
                                 <div class = "input-box">
                                         <input type = "text" name = "username" placeholder = "Email or phone number"/>
                                 </div>
                                 <div class = "input-box">
                                         <input type = "password" name = "password" placeholder = "Password"/>
                                 </div>
                                 <div id = "login-button">
                                         <button type = "submit">Log in</button>
                                 </div>
                                 <div id = "forgot-password">
                                         <a href = "">Forgot password?</a>
                                 </div>
                                 <div id = "create-account">
                                         <button type = "submit">Create new account</button
                                 </div>
                         </form>
                 </div>
                 <div class = "create-page-for-celebrity">
                        <h5>
                                <p><a href = "">Create a Page</a> for a celebrity, brand or business.</p>
                        </h5>
                 </div>
                 <div class = "footer">
                         <div class = "languages">
                                 <ul class="lang">
                                         <li>English(US)</li>
                                         <li><a id="kz" href="facebook_kz.html">Қазақша</a></li>
                                         <li><a id="ru" href="facebook_ru.html">Русский</a></li>
                                 </ul>
                         </div>
                 </div>

         </div>
</body>
</html>
